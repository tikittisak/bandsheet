<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleepwalk — Larry Carlton · Band Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f6f2;--surface:#fff;--border:#e0ddd6;--border-strong:#c8c4bc;--text:#1a1917;--text-muted:#8a8780;--text-faint:#c4c1bb;--accent:#2a2a2a;--cell-w:130px;--cell-h:72px;--gap:6px;--radius:5px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'IBM Plex Sans Thai',sans-serif;color:var(--text);min-height:100vh;padding:0 0 80px}
#toolbar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
#toolbar h1{font-family:'Inter',sans-serif;font-size:14px;font-weight:600;flex:1;min-width:200px}
#toolbar h1 span{color:var(--text-muted);font-weight:400}
.tb-meta{font-size:11px;color:var(--text-muted);font-family:'Inter',sans-serif}
.tb-btn{font-size:11px;font-weight:500;padding:5px 12px;border:1px solid var(--border-strong);border-radius:4px;background:var(--surface);color:var(--text);cursor:pointer;transition:background .12s;font-family:inherit;white-space:nowrap}
.tb-btn:hover{background:var(--bg);border-color:var(--accent)}
.tb-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.tb-btn.primary:hover{background:#333}
.tb-sep{width:1px;height:20px;background:var(--border)}
#sheet{padding:8px 24px 24px}
.section{margin-bottom:18px}
.section-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:0 2px;flex-wrap:wrap}
.section-tag{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:3px;cursor:pointer;transition:opacity .12s}
.section-tag:hover{opacity:.8}
.section-note{font-size:11px;color:var(--text-muted);font-family:'Inter',sans-serif;border:none;background:transparent;outline:none;cursor:text;min-width:40px}
.section-note:focus{background:var(--bg);border-radius:2px;padding:0 3px;color:var(--text)}
.add-row-btn{margin-left:auto;font-size:10px;color:var(--text-muted);background:none;border:1px dashed var(--border-strong);border-radius:3px;padding:2px 8px;cursor:pointer;transition:all .12s;font-family:inherit}
.add-row-btn:hover{color:var(--text);border-color:var(--accent);background:var(--bg)}
.bar-row{display:flex;flex-wrap:wrap;gap:var(--gap);min-height:calc(var(--cell-h) + 4px);padding:3px 2px;border-radius:4px;transition:background .1s;position:relative}
.bar-row.drag-over{background:rgba(59,130,246,.07);outline:2px dashed #3b82f6;outline-offset:-2px}
.bar-cell{width:var(--cell-w);height:var(--cell-h);border-radius:var(--radius);border:1px solid var(--border);border-left-width:3px;padding:6px 8px 5px;display:flex;flex-direction:column;gap:2px;cursor:grab;user-select:none;transition:box-shadow .12s,transform .1s,opacity .1s;position:relative;background:var(--surface)}
.bar-cell:active{cursor:grabbing}
.bar-cell.dragging{opacity:.3;transform:scale(.96)}
.bar-cell.drag-over-left{box-shadow:-3px 0 0 #3b82f6}
.bar-cell:hover{box-shadow:0 2px 8px rgba(0,0,0,.09);z-index:2}
.bar-num{font-family:'Inter',sans-serif;font-size:9px;color:var(--text-faint);line-height:1}
.bar-chord{font-family:'Inter',sans-serif;font-size:15px;font-weight:600;color:var(--text);line-height:1.1;cursor:text;border:none;background:transparent;outline:none;width:100%;padding:0}
.bar-chord:focus{background:rgba(0,0,0,.04);border-radius:2px;padding:0 2px}
.bar-ann{font-size:10px;color:var(--text-muted);cursor:text;border:none;background:transparent;outline:none;width:100%;padding:0;font-family:inherit;line-height:1.2}
.bar-ann:focus{background:rgba(0,0,0,.03);border-radius:2px;padding:0 2px}
.bar-ann::placeholder{color:var(--text-faint);font-style:italic}
.del-btn{position:absolute;top:3px;right:3px;width:14px;height:14px;border-radius:50%;background:none;border:none;color:var(--text-faint);font-size:11px;line-height:14px;text-align:center;cursor:pointer;display:none;padding:0}
.bar-cell:hover .del-btn{display:block}
.del-btn:hover{background:#fee2e2;color:#dc2626}
.add-bar-cell{width:var(--cell-w);height:var(--cell-h);border-radius:var(--radius);border:1px dashed var(--border-strong);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-faint);font-size:20px;transition:all .12s;flex-shrink:0}
.add-bar-cell:hover{border-color:var(--accent);color:var(--text);background:var(--bg)}

/* ── COLOR PICKER POPUP ── */
.color-popup{position:fixed;z-index:500;background:var(--surface);border:1px solid var(--border-strong);border-radius:8px;padding:12px;box-shadow:0 4px 24px rgba(0,0,0,.12);min-width:220px;display:none}
.color-popup.open{display:block}
.color-popup-title{font-family:'Inter',sans-serif;font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px}
.color-swatches{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.swatch{width:24px;height:24px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:transform .1s,border-color .1s;flex-shrink:0}
.swatch:hover{transform:scale(1.15)}
.swatch.active{border-color:var(--accent)}
.color-popup-row{display:flex;align-items:center;gap:8px;margin-top:8px;border-top:1px solid var(--border);padding-top:8px}
.color-popup-row label{font-size:10px;color:var(--text-muted);font-family:'Inter',sans-serif;white-space:nowrap}
.hex-input{font-family:'Inter',sans-serif;font-size:11px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:4px 7px;outline:none;width:90px}
.hex-input:focus{border-color:var(--border-strong)}
.color-preview{width:20px;height:20px;border-radius:3px;border:1px solid var(--border);flex-shrink:0}
.popup-close{margin-left:auto;font-size:10px;background:none;border:none;color:var(--text-muted);cursor:pointer;padding:0;font-family:inherit}
.popup-close:hover{color:var(--text)}


.tb-title-wrap{display:flex;align-items:baseline;gap:6px;flex:1;min-width:200px}
.tb-filename{font-family:'Inter',sans-serif;font-size:14px;font-weight:600;border:none;background:transparent;outline:none;color:var(--text);padding:1px 4px;border-radius:3px;min-width:80px;max-width:260px}
.tb-filename:hover,.tb-artist:hover{background:var(--bg)}
.tb-filename:focus,.tb-artist:focus{background:var(--bg);box-shadow:0 0 0 1.5px var(--border-strong)}
.tb-artist{font-family:'Inter',sans-serif;font-size:14px;font-weight:400;color:var(--text-muted);border:none;background:transparent;outline:none;padding:1px 4px;border-radius:3px;min-width:60px;max-width:200px}
.bar-cell.highlighted{outline:2px solid #f59e0b;outline-offset:-1px;background:#fffbeb !important;z-index:3}
.bar-cell.highlighted .bar-chord{color:#92400e}
.bar-cell.highlighted .bar-num{color:#d97706}
.highlight-dot{position:absolute;top:3px;left:8px;width:6px;height:6px;border-radius:50%;background:#f59e0b;display:none}
.bar-cell.highlighted .highlight-dot{display:block}
.highlight-btn{position:absolute;bottom:3px;right:3px;width:14px;height:14px;border-radius:3px;background:none;border:none;color:var(--text-faint);font-size:10px;cursor:pointer;display:none;padding:0;line-height:14px;text-align:center}
.bar-cell:hover .highlight-btn{display:block}
.bar-cell.highlighted .highlight-btn{display:block;color:#f59e0b}
.highlight-btn:hover{background:rgba(245,158,11,.15);color:#d97706}
.section-actions{margin-left:auto;display:flex;gap:4px}
.sec-btn{font-size:10px;color:var(--text-muted);background:none;border:1px dashed var(--border-strong);border-radius:3px;padding:2px 8px;cursor:pointer;transition:all .12s;font-family:inherit;white-space:nowrap}
.sec-btn:hover{color:var(--text);border-color:var(--accent);background:var(--bg)}
#metabar{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 24px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.meta-label{font-size:10px;color:var(--text-faint);font-family:'Inter',sans-serif;letter-spacing:.06em;text-transform:uppercase;margin-right:2px}
.meta-input{font-family:'Inter',sans-serif;font-size:12px;font-weight:500;color:var(--text);border:none;background:transparent;outline:none;min-width:20px;max-width:80px;padding:2px 4px;border-radius:3px;transition:background .12s}
.meta-input:hover{background:var(--bg)}
.meta-input:focus{background:var(--bg);box-shadow:0 0 0 1.5px var(--border-strong)}
.meta-sep{color:var(--border-strong);font-size:12px;margin:0 4px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;font-size:12px;padding:8px 18px;border-radius:20px;opacity:0;pointer-events:none;transition:opacity .2s;font-family:'Inter',sans-serif;white-space:nowrap;z-index:999}
#toast.show{opacity:1}
/* ── IMAGE NOTE ── */
.img-block{padding:2px 2px 6px;display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap}
.img-item{position:relative;display:inline-flex;flex-direction:column;gap:3px;flex-shrink:0}
.img-item img{width:120px;height:80px;object-fit:cover;border-radius:4px;border:1px solid var(--border);cursor:zoom-in;display:block}
.img-item img:hover{opacity:.88}
.img-caption{font-size:10px;font-family:'Inter',sans-serif;color:var(--text-muted);border:none;background:transparent;outline:none;width:120px;padding:1px 2px}
.img-caption:focus{background:var(--bg);border-radius:2px}
.img-caption::placeholder{color:var(--text-faint);font-style:italic}
.img-del-btn{position:absolute;top:3px;right:3px;width:16px;height:16px;border-radius:50%;background:rgba(0,0,0,.55);border:none;color:#fff;font-size:11px;line-height:16px;text-align:center;cursor:pointer;display:none;padding:0}
.img-item:hover .img-del-btn{display:block}
.img-del-btn:hover{background:#dc2626}
.img-add-btn{font-size:10px;color:var(--text-muted);background:none;border:1px dashed var(--border-strong);border-radius:4px;padding:4px 10px;cursor:pointer;transition:all .12s;font-family:inherit;align-self:flex-start}
.img-add-btn:hover{color:var(--text);border-color:var(--accent);background:var(--bg)}
@media print{#toolbar,#metabar,.add-row-btn,.sec-btn,.add-bar-cell,.del-btn,.color-popup,.img-add-btn,.img-del-btn,.highlight-btn{display:none!important}body{padding:0;background:#fff}#sheet{padding:12px}.bar-cell{break-inside:avoid}}
/* ── MINI VIEW ── */
body.view-mini{--cell-w:112px;--cell-h:36px;--gap:3px}
body.view-mini .bar-ann{display:none!important}
body.view-mini .bar-num{display:none!important}
body.view-mini .bar-chord{font-size:12px;font-weight:700}
body.view-mini .highlight-btn{display:none!important}
body.view-mini .del-btn{display:none!important}
body.view-mini .add-bar-cell{display:none!important}
body.view-mini .section-actions{display:none!important}
body.view-mini .section-note{display:inline-block!important;max-width:100%}
body.view-mini .img-block{display:flex!important;flex-wrap:wrap;gap:var(--gap)}
body.view-mini .img-item{display:inline-flex!important;flex-direction:column;width:var(--cell-w);flex-shrink:0}
body.view-mini .img-item img{width:var(--cell-w);height:auto;max-height:90px;object-fit:cover;border-radius:4px}
body.view-mini .img-caption{width:var(--cell-w);font-size:9px}
body.view-mini .img-add-btn{display:none!important}
body.view-mini .img-del-btn{display:none!important}
/* ── COLS TOGGLE ── */
.cols-toggle{display:flex;border:1px solid var(--border-strong);border-radius:4px;overflow:hidden}
.cols-btn{font-size:11px;font-weight:500;padding:5px 10px;background:var(--surface);border:none;border-right:1px solid var(--border-strong);color:var(--text-muted);cursor:pointer;transition:background .12s;font-family:inherit}
.cols-btn:last-child{border-right:none}
.cols-btn.active{background:var(--accent);color:#fff}
/* ── SECTION LABEL INPUT (rename) ── */
.section-label-inp{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:1px solid;background:transparent;color:inherit;border-radius:3px;padding:2px 7px;outline:none;font-family:inherit;min-width:40px;max-width:140px}
</style>
</head>
<body>
<div id="toolbar">
  <div class="tb-title-wrap">
    <input class="tb-filename" id="tb-filename" value="Sleepwalk" oninput="updateTitle()">
    <input class="tb-artist" id="tb-artist" value="— Larry Carlton" oninput="updateTitle()">
  </div>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="addSection()">+ Section</button>
  <button class="tb-btn" onclick="renumberAll()">Renumber</button>
  <div class="tb-sep"></div>
  <div class="cols-toggle">
    <button class="cols-btn" id="cols-4" onclick="setCols(4)">4</button>
    <button class="cols-btn active" id="cols-8" onclick="setCols(8)">8</button>
  </div>
  <button class="tb-btn" id="mini-btn" onclick="toggleMini()">📐 Mini</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="saveToFile()">💾 Save HTML</button>
  <button class="tb-btn primary" onclick="window.print()">🖨 Print / PDF</button>
</div>
<div id="metabar">
  <span class="meta-label">Key</span>
  <input class="meta-input" id="meta-key" value="C / Eb" style="width:60px" oninput="saveMeta()">
  <span class="meta-sep">·</span>
  <span class="meta-label">BPM</span>
  <input class="meta-input" id="meta-bpm" value="~133 BPM" style="width:60px" oninput="saveMeta()">
  <span class="meta-sep">·</span>
  <span class="meta-label">Time</span>
  <input class="meta-input" id="meta-time" value="4/4" style="width:36px" oninput="saveMeta()">
</div>
<div id="sheet"></div>
<div id="toast"></div>

<!-- Color picker popup -->
<div class="color-popup" id="colorPopup">
  <div class="color-popup-title">เลือกสี Section</div>
  <div class="color-swatches" id="swatches"></div>
  <div class="color-popup-row">
    <label>Hex</label>
    <div class="color-preview" id="hexPreview"></div>
    <input class="hex-input" id="hexInput" maxlength="7" placeholder="#3b82f6">
    <button class="popup-close" onclick="closeColorPicker()">✕</button>
  </div>
</div>

// ── COLOR HELPERS ──
function hexToRgb(hex) {
  var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return {r:r,g:g,b:b};
}
function lighten(hex, amt) {
  var c = hexToRgb(hex);
  var r = Math.min(255, c.r + Math.round((255-c.r)*amt));
  var g = Math.min(255, c.g + Math.round((255-c.g)*amt));
  var b = Math.min(255, c.b + Math.round((255-c.b)*amt));
  return '#'+[r,g,b].map(function(x){return x.toString(16).padStart(2,'0')}).join('');
}
function darken(hex, amt) {
  var c = hexToRgb(hex);
  var r = Math.max(0, Math.round(c.r*(1-amt)));
  var g = Math.max(0, Math.round(c.g*(1-amt)));
  var b = Math.max(0, Math.round(c.b*(1-amt)));
  return '#'+[r,g,b].map(function(x){return x.toString(16).padStart(2,'0')}).join('');
}
function isValidHex(h) { return /^#[0-9a-fA-F]{6}$/.test(h); }
function colorFromBar(bar) {
  return { bar: bar, bg: lighten(bar, 0.88), lbl: darken(bar, 0.35) };
}

// ── RENDER ──
function render() {
  var sheet = document.getElementById('sheet');
  sheet.innerHTML = '';
  var n = 1;
  SECTIONS.forEach(function(sec, si) {
    var col = sec.color || PRESETS[si % PRESETS.length];
    var div = document.createElement('div');
    div.className = 'section';
    div.dataset.si = si;

    var head = document.createElement('div');
    head.className = 'section-head';

    // color tag (clickable)
    var tag = document.createElement('span');
    tag.className = 'section-tag';
    tag.textContent = sec.label;
    tag.title = 'คลิกเพื่อเปลี่ยนสี';
    tag.style.background = col.bg;
    tag.style.color = col.lbl;
    tag.style.border = '1px solid ' + col.bar + '44';
    tag.onclick = (function(idx, el){ return function(e){ openColorPicker(idx, el, e); }; })(si, tag);
    tag.title = 'คลิกเพื่อเปลี่ยนสี · ดับเบิลคลิกเพื่อเปลี่ยนชื่อ';
    tag.ondblclick = (function(idx, el){ return function(e){
      e.stopPropagation(); closeColorPicker();
      var inp = document.createElement('input');
      inp.className = 'section-label-inp';
      inp.value = SECTIONS[idx].label;
      inp.style.background = (SECTIONS[idx].color||{}).bg || '#eef';
      inp.style.color = (SECTIONS[idx].color||{}).lbl || '#333';
      inp.style.borderColor = (SECTIONS[idx].color||{}).bar || '#888';
      el.parentNode.replaceChild(inp, el);
      inp.focus(); inp.select();
      function done(){ var v = inp.value.trim(); if(v) SECTIONS[idx].label = v; render(); }
      inp.onblur = done;
      inp.onkeydown = function(ev){ if(ev.key==='Enter'){ inp.blur(); } if(ev.key==='Escape'){ render(); } };
    }; })(si, tag);

    var noteEl = document.createElement('input');
    noteEl.className = 'section-note';
    noteEl.value = sec.note;
    noteEl.placeholder = 'note...';
    noteEl.oninput = (function(idx){ return function(){ SECTIONS[idx].note = this.value; }; })(si);

    var acts = document.createElement('div'); acts.className = 'section-actions';
    var addRowBtn = document.createElement('button'); addRowBtn.className = 'sec-btn'; addRowBtn.textContent = '+ row';
    addRowBtn.onclick = (function(idx){ return function(){ addRow(idx); }; })(si);
    var dupBtn = document.createElement('button'); dupBtn.className = 'sec-btn'; dupBtn.textContent = '⊕ Duplicate';
    dupBtn.onclick = (function(idx){ return function(){ duplicateSection(idx); }; })(si);
    acts.appendChild(addRowBtn); acts.appendChild(dupBtn);
    head.appendChild(tag);
    head.appendChild(noteEl);
    head.appendChild(acts);
    div.appendChild(head);

    // ── Image note block ──
    if (!sec.images) sec.images = [];
    var imgBlock = document.createElement('div'); imgBlock.className = 'img-block';
    sec.images.forEach(function(img, ii) {
      var item = document.createElement('div'); item.className = 'img-item';
      var imgEl = document.createElement('img'); imgEl.src = img.src; imgEl.title = img.caption || '';
      imgEl.onclick = function() { window.open(img.src, '_blank'); };
      var capEl = document.createElement('input'); capEl.className = 'img-caption';
      capEl.value = img.caption || ''; capEl.placeholder = 'caption...';
      capEl.oninput = (function(s,i){ return function(){ SECTIONS[s].images[i].caption = this.value; }; })(si, ii);
      capEl.onmousedown = capEl.onclick = function(e){ e.stopPropagation(); };
      var iDel = document.createElement('button'); iDel.className = 'img-del-btn'; iDel.textContent = '×';
      iDel.onclick = (function(s,i){ return function(e){ e.stopPropagation(); removeImageNote(s,i); }; })(si, ii);
      item.appendChild(imgEl); item.appendChild(capEl); item.appendChild(iDel);
      imgBlock.appendChild(item);
    });
    var addImgBtn = document.createElement('button'); addImgBtn.className = 'img-add-btn'; addImgBtn.textContent = '📷 Add Image';
    addImgBtn.onclick = (function(idx){ return function(e){ e.stopPropagation(); addImageNote(idx); }; })(si);
    imgBlock.appendChild(addImgBtn);
    div.appendChild(imgBlock);

    for (var r = 0; r * COLS < sec.bars.length; r++) {
      var row = document.createElement('div');
      row.className = 'bar-row';
      row.dataset.si = si;
      var start = r * COLS, end = Math.min(start + COLS, sec.bars.length);
      for (var i = start; i < end; i++) {
        row.appendChild(makeCell(sec.bars[i], si, i, n++, col));
      }
      if (end === sec.bars.length) {
        var addBtn = document.createElement('div');
        addBtn.className = 'add-bar-cell';
        addBtn.textContent = '+';
        addBtn.style.borderColor = col.bar + '66';
        addBtn.onclick = (function(idx){ return function(){ SECTIONS[idx].bars.push({c:'—',a:''}); render(); }; })(si);
        row.appendChild(addBtn);
      }
      setupDrop(row);
      div.appendChild(row);
    }
    sheet.appendChild(div);
  });
}

function makeCell(bar, si, bi, num, col) {
  var cell = document.createElement('div');
  cell.className = 'bar-cell' + (bar.h ? ' highlighted' : '');
  cell.draggable = true;
  cell.dataset.si = si; cell.dataset.bi = bi;
  cell.style.borderLeftColor = bar.h ? '#f59e0b' : col.bar;
  if (!bar.h) cell.style.background = col.bg;

  var dot = document.createElement('span');
  dot.className = 'highlight-dot';

  var numEl = document.createElement('span');
  numEl.className = 'bar-num';
  numEl.textContent = num;

  var chordEl = document.createElement('input');
  chordEl.className = 'bar-chord';
  chordEl.value = bar.c;
  chordEl.oninput = (function(s,b){ return function(){ SECTIONS[s].bars[b].c = this.value; }; })(si,bi);
  chordEl.onmousedown = function(e){ e.stopPropagation(); };
  chordEl.onclick    = function(e){ e.stopPropagation(); };

  var annEl = document.createElement('input');
  annEl.className = 'bar-ann';
  annEl.value = bar.a || '';
  annEl.placeholder = 'annotation...';
  annEl.oninput = (function(s,b){ return function(){ SECTIONS[s].bars[b].a = this.value; }; })(si,bi);
  annEl.onmousedown = function(e){ e.stopPropagation(); };
  annEl.onclick    = function(e){ e.stopPropagation(); };

  var delBtn = document.createElement('button');
  delBtn.className = 'del-btn';
  delBtn.textContent = '×';
  delBtn.onclick = (function(s,b){ return function(e){ e.stopPropagation(); deleteBar(s,b); }; })(si,bi);

  var hlBtn = document.createElement('button');
  hlBtn.className = 'highlight-btn';
  hlBtn.textContent = '★';
  hlBtn.title = 'Toggle highlight';
  hlBtn.onclick = (function(s,b){ return function(e){ e.stopPropagation(); SECTIONS[s].bars[b].h = !SECTIONS[s].bars[b].h; render(); }; })(si,bi);

  cell.appendChild(dot); cell.appendChild(numEl); cell.appendChild(chordEl);
  cell.appendChild(annEl); cell.appendChild(delBtn); cell.appendChild(hlBtn);

  cell.addEventListener('dragstart', function(e) {
    dragSrc = cell; cell.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', si+','+bi);
  });
  cell.addEventListener('dragend', function() {
    cell.classList.remove('dragging');
    document.querySelectorAll('.drag-over-left').forEach(function(el){ el.classList.remove('drag-over-left'); });
    dragSrc = null;
  });
  return cell;
}

function setupDrop(row) {
  row.addEventListener('dragover', function(e) {
    e.preventDefault(); row.classList.add('drag-over');
    var after = getAfter(row, e.clientX);
    document.querySelectorAll('.drag-over-left').forEach(function(el){ el.classList.remove('drag-over-left'); });
    if (after) after.classList.add('drag-over-left');
  });
  row.addEventListener('dragleave', function(e) {
    if (!row.contains(e.relatedTarget)) { row.classList.remove('drag-over');
      document.querySelectorAll('.drag-over-left').forEach(function(el){ el.classList.remove('drag-over-left'); }); }
  });
  row.addEventListener('drop', function(e) {
    e.preventDefault(); row.classList.remove('drag-over');
    document.querySelectorAll('.drag-over-left').forEach(function(el){ el.classList.remove('drag-over-left'); });
    if (!dragSrc) return;
    var parts = e.dataTransfer.getData('text/plain').split(',');
    var fromSi = parseInt(parts[0]), fromBi = parseInt(parts[1]);
    var toSi = parseInt(row.dataset.si);
    var after = getAfter(row, e.clientX);
    var toBi = after ? parseInt(after.dataset.bi) : SECTIONS[toSi].bars.length;
    var moved = SECTIONS[fromSi].bars.splice(fromBi, 1)[0];
    if (fromSi === toSi && toBi > fromBi) toBi--;
    SECTIONS[toSi].bars.splice(toBi, 0, moved);
    render(); toast('สลับห้องแล้ว ✓');
  });
}

function getAfter(row, x) {
  var cells = Array.from(row.querySelectorAll('.bar-cell:not(.dragging)'));
  var res = null, best = -Infinity;
  cells.forEach(function(c) {
    var box = c.getBoundingClientRect();
    var offset = x - box.left - box.width/2;
    if (offset < 0 && offset > best) { best = offset; res = c; }
  });
  return res;
}

// ── COLOR PICKER ──
function openColorPicker(si, tagEl, e) {
  e.stopPropagation();
  pickerSi = si;
  var popup = document.getElementById('colorPopup');
  var col = SECTIONS[si].color || PRESETS[0];

  // build swatches
  var sw = document.getElementById('swatches');
  sw.innerHTML = '';
  PRESETS.forEach(function(p, i) {
    var s = document.createElement('div');
    s.className = 'swatch' + (p.bar === col.bar ? ' active' : '');
    s.style.background = p.bar;
    s.title = p.bar;
    s.onclick = function() {
      applyColor(si, p);
      closeColorPicker();
    };
    sw.appendChild(s);
  });

  // hex input
  var hexInput = document.getElementById('hexInput');
  var hexPreview = document.getElementById('hexPreview');
  hexInput.value = col.bar;
  hexPreview.style.background = col.bar;
  hexInput.oninput = function() {
    var v = this.value;
    if (!v.startsWith('#')) v = '#' + v;
    hexPreview.style.background = isValidHex(v) ? v : '#ccc';
    if (isValidHex(v)) {
      applyColor(si, colorFromBar(v));
    }
  };
  hexInput.onkeydown = function(e) { if (e.key === 'Enter') closeColorPicker(); };

  // position popup near tag
  var rect = tagEl.getBoundingClientRect();
  popup.style.top = (rect.bottom + 6) + 'px';
  popup.style.left = rect.left + 'px';
  // keep in viewport
  popup.classList.add('open');
  var pr = popup.getBoundingClientRect();
  if (pr.right > window.innerWidth - 8) popup.style.left = (window.innerWidth - pr.width - 8) + 'px';
}

function applyColor(si, col) {
  SECTIONS[si].color = col;
  render();
  // reopen with new position after re-render
}

function closeColorPicker() {
  document.getElementById('colorPopup').classList.remove('open');
  pickerSi = null;
}

document.addEventListener('click', function(e) {
  var popup = document.getElementById('colorPopup');
  if (popup.classList.contains('open') && !popup.contains(e.target)) closeColorPicker();
});

// ── ACTIONS ──
function deleteBar(si, bi) {
  if (SECTIONS[si].bars.length <= 1) return toast('ต้องมีอย่างน้อย 1 ห้อง');
  SECTIONS[si].bars.splice(bi, 1); render();
}
function addRow(si) {
  for (var i = 0; i < 8; i++) SECTIONS[si].bars.push({c:'—',a:'',h:false});
  render(); toast('เพิ่มแถวแล้ว (8 ห้อง)');
}
function renumberAll() { render(); toast('Renumber เรียบร้อย'); }
function addSection() {
  var name = prompt('ชื่อ section ใหม่:');
  if (!name) return;
  var col = PRESETS[SECTIONS.length % PRESETS.length];
  SECTIONS.push({id:'verse',label:name,note:'',color:col,images:[],bars:[{c:'C',a:'',h:false}]});
  render(); toast('เพิ่ม section แล้ว');
}
function scrollTo(id) {
  var el = document.querySelector('[data-si="'+id+'"]');
  if (el) el.scrollIntoView({behavior:'smooth',block:'start'});
}
function setCols(n) {
  COLS = n;
  var b4 = document.getElementById('cols-4');
  var b8 = document.getElementById('cols-8');
  if(b4) b4.classList.toggle('active', n===4);
  if(b8) b8.classList.toggle('active', n===8);
  render();
}
function toggleMini() {
  VIEW = VIEW === 'mini' ? 'normal' : 'mini';
  document.body.classList.toggle('view-mini', VIEW === 'mini');
  var btn = document.getElementById('mini-btn');
  if (btn) { btn.classList.toggle('primary', VIEW === 'mini'); btn.textContent = VIEW === 'mini' ? '🔲 Full' : '📐 Mini'; }
}

// ── SAVE ──
function saveToFile() {
  var html = document.documentElement.outerHTML;
  var dataStr = JSON.stringify(SECTIONS);
  html = html.replace(
    /var SECTIONS = \[[\s\S]*?\];\s*\/\/ ── END DATA ──/,
    'var SECTIONS = ' + dataStr + ';\n// ── END DATA ──'
  );
  var blob = new Blob(['<!DOCTYPE html>\n' + html], {type:'text/html;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  var fn=(document.getElementById('tb-filename')||{value:'sleepwalk'}).value||'sleepwalk';
  a.download = fn.replace(/\s+/g,'-').toLowerCase()+'.html';
  document.body.appendChild(a); a.click();
  setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 100);
  toast('บันทึกแล้ว ✓');
}


function updateTitle(){
  var fn = document.getElementById('tb-filename').value;
  var ar = document.getElementById('tb-artist').value;
  document.title = fn + ' ' + ar + ' · Band Sheet';
}
function saveMeta(){
  if(typeof META!=='undefined'){
    META.key  = document.getElementById('meta-key').value;
    META.bpm  = document.getElementById('meta-bpm').value;
    META.time = document.getElementById('meta-time').value;
  }
}
function duplicateSection(si){
  var copy = JSON.parse(JSON.stringify(SECTIONS[si]));
  copy.label = copy.label + ' (copy)';
  copy.images = [];
  SECTIONS.splice(si+1, 0, copy);
  render(); toast('Duplicate section แล้ว ✓');
}
function addImageNote(si) {
  var inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = function() {
    if (!this.files[0]) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      if (!SECTIONS[si].images) SECTIONS[si].images = [];
      SECTIONS[si].images.push({ src: e.target.result, caption: '' });
      render(); toast('เพิ่มรูปแล้ว ✓');
    };
    reader.readAsDataURL(this.files[0]);
  };
  inp.click();
}
function removeImageNote(si, ii) {
  SECTIONS[si].images.splice(ii, 1);
  render(); toast('ลบรูปแล้ว ✓');
}
var toastTimer;
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2400);
}

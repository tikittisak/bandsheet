<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE MÆWJØNS — Band Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans+Thai:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0e0e;--surface:#181818;--border:#2a2a2a;--text:#f0ede8;--muted:#666;--accent:#f472b6}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans Thai',sans-serif;min-height:100vh}
header{padding:32px 40px 28px;border-bottom:1px solid var(--border)}
.breadcrumb{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;margin-bottom:14px}
.breadcrumb a{color:var(--muted);text-decoration:none}
.breadcrumb a:hover{color:var(--text)}
.band-tag{display:inline-block;background:rgba(255,255,255,.06);color:var(--accent);font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:3px 10px;border-radius:3px;margin-bottom:10px;border:1px solid rgba(255,255,255,.1)}
h1{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:700;letter-spacing:-.02em}
main{padding:60px 40px;text-align:center}
.empty-icon{font-size:40px;margin-bottom:16px;opacity:.3}
.empty-msg{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--muted);line-height:1.8}
footer{position:fixed;bottom:0;left:0;right:0;padding:16px 40px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;background:var(--bg);display:flex;justify-content:space-between}
</style>
</head>
<body>
<header>
  <div class="breadcrumb"><a href="../">Band Sheet</a> / THE MÆWJØNS</div>
  <div class="band-tag">THE MÆWJØNS</div>
  <h1>Song List</h1>
</header>
<main>
  <div class="empty-icon">♩</div>
  <div class="empty-msg">ยังไม่มี band sheet<br>อัปโหลด MIDI แล้วให้ Claude generate ได้เลย</div>
</main>
<footer>
  <span>THE MÆWJØNS · Band Sheet</span>
  <span><a href="../" style="color:var(--muted);text-decoration:none">← back to all bands</a></span>
</footer>
</body>
</html>
